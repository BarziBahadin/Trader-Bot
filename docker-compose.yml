services:
  trader-api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/trading_bot.db
      TELEGRAM_CONFLICT_BACKOFF_SECONDS: 60
    ports:
      - "8000:8000"
    volumes:
      - ./cmd:/app/cmd
      - ./internal:/app/internal
      - ./STOP_BOT.txt:/app/STOP_BOT.txt
      - trader-data:/app/data
      - ./logs:/app/logs
  trader-dashboard:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      VITE_API_URL: http://127.0.0.1:8000/api/v1
      VITE_API_TOKEN: ${API_AUTH_TOKEN:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - trader-api

volumes:
  trader-data:
  frontend-node-modules:
